<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta Digital</title>
    <meta name="description" content="Tarjeta digital de contacto">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="card-page">
        <!-- Tarjeta -->
        <div class="digital-card" id="digitalCard" style="display: none;">
            <!-- Cabecera con gradiente y logo -->
            <div class="card-header-section">
                <img src="https://res.cloudinary.com/dfczxcczj/image/upload/v1772675185/89637312-logo-isolated-on-premium-white-round-button-abstract-illustration_xls1m7.jpg"
                    alt="Logo Empresa" class="card-logo"
                    style="filter: none; border-radius: 8px; position: absolute; top: 12px; left: 12px; margin: 0; width: 44px; height: 44px;">
            </div>

            <!-- Coin-flip: Foto / QR -->
            <div class="coin-flip-container" id="coinFlip" title="Toca para ver el código QR">
                <div class="coin-flip-inner" id="coinFlipInner">
                    <div class="coin-flip-front">
                        <img id="employeePhoto" src="" alt="Foto empleado">
                    </div>
                    <div class="coin-flip-back">
                        <img id="qrCode" src="" alt="Código QR">
                    </div>
                </div>
            </div>

            <!-- Info del empleado -->
            <div class="card-info">
                <h2 id="employeeName">Cargando...</h2>
                <p class="card-position" id="employeePosition"></p>
                <p class="card-rut" id="employeeRut"
                    style="display: none; font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px;"></p>
            </div>

            <!-- Botones circulares de contacto (estilo LaceyTiendita) -->
            <div class="contact-buttons-row" id="contactButtonsRow">
                <!-- Se llenan dinámicamente -->
            </div>

            <!-- Acciones: Agregar Contacto + Compartir -->
            <div class="card-actions-row">
                <a href="#" class="card-action-link" id="addContactBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <line x1="19" y1="8" x2="19" y2="14" />
                        <line x1="22" y1="11" x2="16" y2="11" />
                    </svg>
                    Agregar Contacto
                </a>
                <a href="#" class="card-action-link" id="shareBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" />
                        <polyline points="16 6 12 2 8 6" />
                        <line x1="12" y1="2" x2="12" y2="15" />
                    </svg>
                    Compartir
                </a>
            </div>

            <!-- Sección de documentos -->
            <div class="documents-section" id="documentsSection" style="display: none;">
                <h3>Documentos</h3>
                <div id="documentsList"></div>
            </div>
        </div>

        <!-- Loading state -->
        <div id="loadingState" class="text-center" style="padding: 80px 20px;">
            <div class="loading-spinner"></div>
            <p class="text-muted mt-2">Cargando tarjeta digital...</p>
        </div>

        <!-- Error state -->
        <div id="errorState" class="text-center" style="padding: 80px 20px; display: none;">
            <h2>Tarjeta no encontrada</h2>
            <p class="text-muted mt-1">El empleado no existe o el enlace es incorrecto.</p>
        </div>
    </div>

    <!-- Modal de confirmación para documentos -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal confirm-modal" style="max-width: 400px;">
            <div class="confirm-icon" style="font-size: 3rem; text-align: center; margin-bottom: 16px;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                    <line x1="12" y1="9" x2="12" y2="13" />
                    <line x1="12" y1="17" x2="12.01" y2="17" />
                </svg>
            </div>
            <h3 class="text-center mb-2">Confirmar lectura</h3>
            <p>¿Estás seguro de haber leído el documento <strong id="confirmDocName"></strong> en su totalidad?</p>
            <p class="warning-text mt-1">Esta acción no se puede deshacer</p>
            <div class="modal-footer" style="justify-content: center;">
                <button class="btn btn-secondary" id="confirmCancel">Cancelar</button>
                <button class="btn btn-success" id="confirmAccept">Sí, lo he leído</button>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/js/card.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjeta Digital - Iniciar Sesión</title>
  <meta name="description" content="Plataforma de tarjetas digitales para empleados">
  <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
  <div class="login-wrapper">
    <div class="login-card">
      <!-- Logo empresa desde Cloudinary -->
      <img
        src="https://res.cloudinary.com/dfczxcczj/image/upload/v1772675185/89637312-logo-isolated-on-premium-white-round-button-abstract-illustration_xls1m7.jpg"
        alt="Logo Empresa" class="logo">

      <h1>Bienvenido</h1>
      <p class="subtitle">Ingresa tus credenciales para continuar</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" class="form-control" placeholder="Tu nombre de usuario" required
            autocomplete="username">
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required
            autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
          Iniciar Sesión
        </button>
      </form>

      <p class="text-center text-muted mt-2" style="font-size: 0.8rem;">
        Credenciales proporcionadas por el administrador
      </p>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/login.js"></script>
</body>

</html>
